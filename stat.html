<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据统计中心 - 深链存证</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
  <style>
    .chart-container {width:100%;height:350px;margin:20px 0;}
    .chart-grid {display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  </style>
</head>
<body>
<nav class="navbar">
  <div class="container">
    <a href="index.html" class="logo">深链存证</a>
    <div class="nav-links">
      <a href="cert_records.html">记录</a>
      <a href="stat.html" class="active">统计</a>
      <a href="pay.html">会员充值</a>
    </div>
  </div>
</nav>
<div class="main-content">
  <div class="container">
    <div class="card">
      <h2>📊 平台数据可视化统计大屏</h2>
      <div class="grid-stat">
        <div class="stat-item"><h3>累计存证总数</h3><p id="totalCert">0</p></div>
        <div class="stat-item"><h3>会员等级</h3><p id="userLevel">免费版</p></div>
        <div class="stat-item"><h3>今日已存证</h3><p id="todayCert">0</p></div>
      </div>
      <div class="chart-grid">
        <div>
          <h3>七日存证趋势</h3>
          <div id="trendChart" class="chart-container"></div>
        </div>
        <div>
          <h3>文件类型占比</h3>
          <div id="pieChart" class="chart-container"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="app.js"></script>
<script>
let trendChart,pieChart;
function initEcharts(){
  trendChart = echarts.init(document.getElementById("trendChart"));
  pieChart = echarts.init(document.getElementById("pieChart"));
  trendChart.setOption({
    xAxis:{data:["1日","2日","3日","4日","5日","6日","7日"]},
    yAxis:{},
    series:[{type:"line",data:[2,5,3,7,6,9,4],smooth:true}]
  });
  pieChart.setOption({
    series:[{type:"pie",radius:"70%",data:[{value:50,name:"PDF"},{value:30,name:"图片"},{value:20,name:"其他"}]}]
  });
}
window.onload=async function(){
  initTheme();initLang();updateNavUserName();initEcharts();requireLogin();
  let res = await fetch(`${API_BASE}/stat/${userInfo.username}`).then(r=>r.json());
  document.getElementById("totalCert").innerText=res.cert;
  document.getElementById("todayCert").innerText=localStorage.getItem("today_certify")||0;
  let levelText={free:"免费版",pro:"专业版",enterprise:"企业版"};
  document.getElementById("userLevel").innerText=levelText[res.member];
}
</script>
</body>
</html>
