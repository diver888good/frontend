<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 深链存证</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="card login-box">
    <h2 style="text-align:center;margin-bottom:20px;">🔐 账号登录</h2>
    <input class="form-control" id="username" placeholder="请输入用户名">
    <input class="form-control" id="pwd" type="password" placeholder="请输入密码">
    <button class="btn btn-primary btn-block" style="margin-top:10px;" onclick="userLogin(username.value,pwd.value)">立即登录</button>
    <a href="register.html" class="btn btn-outline btn-block" style="margin-top:10px;text-align:center;text-decoration:none;">前往注册</a>
    <!-- 新增：忘记密码入口 -->
    <div style="text-align:center;margin-top:15px;">
      <a href="forget_pwd.html" style="color:var(--primary);text-decoration:none;font-size:14px;">忘记密码？点击找回</a>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
