<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>单文件司法存证 - 深链存证</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .preview-box {
      width: 100%;
      min-height: 200px;
      margin: 20px 0;
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 20px;
      text-align: center;
    }
    .preview-img { max-width: 100%; max-height: 400px; border-radius: 8px; }
    .preview-media { width: 100%; height: auto; border-radius: 8px; }
    .preview-pdf { width: 100%; height: 500px; border: none; border-radius: 8px; }
    .file-info { margin: 10px 0; color: var(--text-secondary); }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="container">
    <a href="index.html" class="logo">深链存证</a>
    <div class="nav-links">
      <a href="certify.html" class="active">文件存证</a>
      <a href="batch_certify.html">批量存证</a>
      <a href="chat_certify.html">聊天存证</a>
      <a href="cert_records.html">存证记录</a>
    </div>
    <div class="tool-bar">
      <button class="tool-btn" onclick="toggleTheme()">🌙</button>
      <button class="tool-btn" onclick="toggleLang()">🌐</button>
      <a href="message.html" class="msg-badge"><span class="dot"></span>消息</a>
    </div>
  </div>
</nav>

<div class="main-content">
  <div class="container">
    <div class="card">
      <h2>📁 单文件司法存证</h2>
      <p class="warning">支持：图片/音频/视频/PDF/Word/Excel/PPT 全格式预览+存证</p>

      <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" style="display:none;">
        <h3>点击或拖拽上传文件</h3>
        <p>最大支持 50MB 文件</p>
      </div>

      <div class="file-info" id="fileInfo" style="display:none;"></div>
      <div class="preview-box" id="previewBox">
        <p>文件上传后自动预览</p>
      </div>

      <div class="form-group">
        <label>国密SM3哈希值</label>
        <input type="text" id="hashResult" class="form-control" readonly placeholder="自动生成">
      </div>

      <button class="btn btn-primary btn-block" onclick="startCert()" id="certBtn">开始上链存证</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
let currentFile = null;
let fileHash = "";

document.getElementById('fileInput').addEventListener('change', async (e) => {
  currentFile = e.target.files[0];
  if (!currentFile) return;
  document.getElementById('fileInfo').style.display = "block";
  document.getElementById('fileInfo').innerText = `文件名：${currentFile.name} | 大小：${(currentFile.size / 1024 / 1024).toFixed(2)}MB`;
  const text = await new Promise(res=>{
    const r = new FileReader();
    r.onload=()=>res(r.result);
    r.readAsBinaryString(currentFile);
  });
  fileHash = sm3Hash(text);
  document.getElementById('hashResult').value = fileHash;
  renderFilePreview(currentFile);
});

function renderFilePreview(file) {
  const previewBox = document.getElementById('previewBox');
  const fileName = file.name.toLowerCase();
  previewBox.innerHTML = "";
  if (fileName.match(/\.(jpg|jpeg|png|gif|bmp)$/)) {
    const img = document.createElement('img');
    img.className = "preview-img";
    img.src = URL.createObjectURL(file);
    previewBox.appendChild(img);
  } else if (fileName.match(/\.(mp3|wav|ogg)$/)) {
    const audio = document.createElement('audio');
    audio.className = "preview-media";
    audio.controls = true;
    audio.src = URL.createObjectURL(file);
    previewBox.appendChild(audio);
  } else if (fileName.match(/\.(mp4|avi|mov|flv)$/)) {
    const video = document.createElement('video');
    video.className = "preview-media";
    video.controls = true;
    video.src = URL.createObjectURL(file);
    previewBox.appendChild(video);
  } else if (fileName.endsWith('.pdf')) {
    const iframe = document.createElement('iframe');
    iframe.className = "preview-pdf";
    iframe.src = URL.createObjectURL(file);
    previewBox.appendChild(iframe);
  } else if (fileName.match(/\.(doc|docx|xls|xlsx|ppt|pptx)$/)) {
    const url = URL.createObjectURL(file);
    const officeUrl = `https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(url)}`;
    const iframe = document.createElement('iframe');
    iframe.className = "preview-pdf";
    iframe.src = officeUrl;
    previewBox.appendChild(iframe);
  } else {
    previewBox.innerHTML = `<p>✅ 文件已上传，格式不支持预览，可直接存证</p>`;
  }
}

async function startCert() {
  requireLogin();
  if (!currentFile) { alert("请先上传文件"); return; }
  if (!checkPermission("certify")) { alert("今日存证次数已用尽，升级会员解锁更多次数"); return; }
  showLoading(document.getElementById('certBtn'), '存证上链中...');
  await fetch(`${API_BASE}/cert/add`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      username: userInfo.username,
      type: "单文件存证",
      filename: currentFile.name,
      hash: fileHash
    })
  });
  recordUsage("certify");
  sendNotification("存证成功", `${currentFile.name}已成功上链司法联盟链`);
  alert("✅ 司法联盟链存证成功！");
  hideLoading(document.getElementById('certBtn'), '开始上链存证');
}
</script>
</body>
</html>
